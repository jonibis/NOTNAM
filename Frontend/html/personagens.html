<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Personagens | JAVELF</title>

    <link rel="stylesheet" href="../css/personagens.css">

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

    <nav class="navbar">

        <div class="logo">
            <a href="../html/Index.html">
                JAVELF
            </a>
        </div>

        <div class="menu">
            <a href="../html/história.html">HISTÓRIA</a>
            <a href="../html/forum.html">FORUM</a>
            <a href="../html/personagens.html">PERSONAGENS</a>
            <a href="../html/support.html">SUPPORT </a>
        </div>
        <div class="user-avatar">
            <img src="../img/user-64.png" alt="Avatar do Usuário">
        </div>

    </nav>

    <section class="titulo">

        <p>
            Nessa descrição estão os personagens do nosso jogo
        </p>

    </section>

    <section class="personagem-card" id="personagemCard">


        <button id="anterior" class="seta">
            ❮
        </button>

        <div class="conteudo">

            <div class="texto">

                <h2 id="nome">
                    Nanami
                </h2>

                <p id="descricao">
                    Descrição da personagem.
                </p>

            </div>

            <div class="sprite-principal">

                <img id="spritePrincipal" src="../img/personagens/nanami.png" alt="personagem">

            </div>

        </div>

        <button id="proximo" class="seta">
            ❯
        </button>

    </section>

    <section class="descricao" id="descricaoNanami">

        <h3>
            Descrição do Personagem
        </h3>

        <img src="../img/nanami-costa.png">
        <img src="../img/nanami-direito.png">
        <img src="../img/nanami-esquerdo.png">


    </section>

    <footer>

        <div class="footer-column">
            <h3>Explore</h3>
            <p>Homepage</p>
            <p>The Game</p>
            <p>Characters</p>
        </div>

        <div class="footer-column">
            <section id="SUPPORT">
                <h3>Support</h3>
            </section>
            <p>Help</p>
            <p>Community</p>
            <p>FAQ</p>
        </div>

        <div class="footer-column">
            <h3>Explore</h3>
            <p>News</p>
            <p>Updates</p>
            <p>Discord</p>
        </div>

        <div class="footer-column">
            <h3>Explore</h3>
            <p>Instagram</p>
            <p>Twitter</p>
            <p>YouTube</p>
        </div>

    </footer>

    <script src="../js/personagens.js"></script>

</body>

</html>
