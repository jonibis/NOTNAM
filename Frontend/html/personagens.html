<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Personagens | JAVELF</title>

    <link rel="stylesheet" href="../css/personagens.css">

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

    <nav class="navbar">

        <div class="logo">
            JAVELF
        </div>

        <div class="menu">
            <a href="./história.html">HISTÓRIA</a>
            <a href="#">FEEDBACK</a>
            <a href="#">PERSONAGENS</a>
            <a href="#">SUPORTE</a>
        </div>
        <div class="user-avatar">
            <img src="../img/user-64.png" alt="Avatar do Usuário">
        </div>

    </nav>

    <section class="titulo">

        <p>
            Nessa descrição estão os personagens do nosso jogo
        </p>

    </section>

    <section class="personagem-card" id="personagemCard">


        <button id="anterior" class="seta">
            ❮
        </button>

        <div class="conteudo">

            <div class="texto">

                <h2 id="nome">
                    Nanami
                </h2>

                <p id="descricao">
                    Descrição da personagem.
                </p>

            </div>

            <div class="sprite-principal">

                <img id="spritePrincipal" 
                src="/Frontend/img/personagens/nanami.png" 
                alt="personagem">

            </div>

        </div>

        <button id="proximo" class="seta">
            ❯
        </button>

    </section>

    <section class="descricao" id="descricaoNanami">

        <h3>
            Descrição do Personagem
        </h3>

        <img id="spriteDescricao" src="imagem/personagens/nanami.png">

    </section>

    <script src="../js/personagens.js"></script>

</body>

</html>
