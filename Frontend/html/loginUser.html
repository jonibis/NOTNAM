<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <!-- FONTES -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/Frontend/css/styles_login.css">
</head>

<body>

  <section class="hero">

    <!-- VIDEO -->
    <video autoplay muted loop playsinline class="bg-video">
      <source src="/Frontend/img/floresta..mp4" type="video/mp4">
    </video>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- NAVBAR -->
    <header>

      <div class="logo">
        JAVELF
      </div>

      <nav>

      </nav>

      <div class="profile">

        <img src="/Frontend/img/user-64.png" alt="perfil">

      </div>

    </header>

    <!-- LOGIN -->
    <div class="container">

      <div class="login-card">

        <h1>Login</h1>

        <p>
          Explore a floresta perdida.
        </p>

        <form>

          <label>Usuário, E-mail ou Telefone</label>

          <input type="text" placeholder="Coloque seu nome aqui.">

          <label>Senha</label>

          <input type="password" placeholder="Coloque sua senha aqui.">

          <!-- OPTIONS -->
          <div class="options">

            <label class="remember">

              <input type="checkbox">

              Lembrar-me

            </label>

            <a href="/Frontend/html/forgetPss.html">
              Esqueci a senha
            </a>

          </div>

          <!-- BUTTON -->
          <button type="submit">
            Entrar
          </button>

        </form>

        <!-- REGISTER -->
        <div class="register">

          Não tem uma conta?

          <a href="/Frontend/html/signupUser.html">
            Criar conta
          </a>

        </div>

        <!-- LINE -->
        <div class="line"></div>

        <!-- SOCIAL -->
        <div class="social-buttons">

          <button>Google</button>

          <button>Instagram</button>

        </div>

      </div>

    </div>

  </section>

</body>
</html>
