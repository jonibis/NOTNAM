<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins', sans-serif;
      min-height:100vh;
      background:#111;
      color:white;
    }

    /* BACKGROUND */

    .hero{
      min-height:100vh;
      background:url('sua-imagem.jpg') center/cover no-repeat;
      position:relative;
      padding:40px;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.45);
    }

    /* NAVBAR */

    header{
      position:relative;
      z-index:2;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 40px;
      background:#000;
    }

    .logo{
      font-family:'Press Start 2P', cursive;
      font-size:18px;
    }

    nav{
      display:flex;
      gap:40px;
    }

    nav a{
      color:white;
      text-decoration:none;
      font-size:12px;
      letter-spacing:1px;
    }

    .profile{
      width:35px;
      height:35px;
      border-radius:50%;
      background:#c89cff;
    }

    /* CARD */

    .container{
      position:relative;
      z-index:2;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:85vh;
    }

    .card{
      width:1000px;
      max-width:95%;
      padding:50px;
      border-radius:30px;

      background:rgba(0,0,0,0.45);
      backdrop-filter:blur(10px);

      display:flex;
      gap:50px;
    }

    /* LEFT SIDE */

    .left{
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding-right:40px;
      border-right:1px solid rgba(255,255,255,0.3);
    }

    .left h2{
      font-size:24px;
      margin-bottom:20px;
    }

    .left p{
      font-size:14px;
      opacity:0.8;
      max-width:250px;
    }

    .character{
      width:120px;
      margin-top:30px;
    }

    /* FORM */

    .right{
      flex:1;
    }

    .right h2{
      margin-bottom:10px;
      font-size:28px;
    }

    .right p{
      font-size:13px;
      opacity:0.8;
      margin-bottom:30px;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    input{
      width:100%;
      padding:12px 15px;
      border:none;
      border-radius:20px;
      background:rgba(255,255,255,0.7);
      outline:none;
    }

    .checkbox{
      display:flex;
      gap:10px;
      align-items:flex-start;
      font-size:12px;
    }

    button{
      margin-top:10px;
      padding:14px;
      border:none;
      border-radius:20px;
      background:#c889ff;
      color:white;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#b26eff;
    }

    .login{
      margin-top:20px;
      font-size:13px;
      text-align:center;
    }

    .login a{
      color:#c889ff;
      text-decoration:none;
    }

    /* RESPONSIVO */

    @media(max-width:900px){

      .card{
        flex-direction:column;
      }

      .left{
        border-right:none;
        border-bottom:1px solid rgba(255,255,255,0.3);
        padding-bottom:40px;
      }

      nav{
        display:none;
      }

    }

  </style>
</head>
<body>

  <section class="hero">

    <div class="overlay"></div>

    <header>
      <div class="logo">JÁVELF</div>

      <nav>
        <a href="#">HISTÓRIA</a>
        <a href="#">FEEDBACK</a>
        <a href="#">PERSONAGENS</a>
        <a href="#">SUPORTE</a>
      </nav>

      <div class="profile"></div>
    </header>

    <div class="container">

      <div class="card">

        <!-- LEFT -->

        <div class="left">

          <h2>Aproveite os benefícios de ser usuário</h2>

          <p>
            Ao se cadastrar você tem acesso a exclusividades do jogo
          </p>

          <img
            class="character"
            img src="/Frontend/img/NanamiCat1.png"
            alt="Personagem"
          >

        </div>

        <!-- RIGHT -->

        <div class="right">

          <h2>Cadastre-se</h2>

          <p>
            Preencha com suas informações para criar a conta.
          </p>

          <form action="../backend/cadastro.php" method="POST">

            <input type="text" name="nome" placeholder="Nome" required>

            <input type="email" name="email" placeholder="E-mail" required>

            <input type="tel" name="telefone" placeholder="Telefone" required>

            <input type="password" name="senha" placeholder="Senha" required>

            <label class="checkbox">
              <input type="checkbox">
              Desejo receber notificações por e-mail
            </label>

            <label class="checkbox">
              <input type="checkbox">
              Desejo receber notificações por SMS
            </label>

            <button type="submit">
              Continuar
            </button>

          </form>

          <div class="login">
            Já tem uma conta?
            <a href="#">Faça o login</a>
          </div>

        </div>

      </div>

    </div>

  </section>

</body>
</html>
