<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link  rel="stylesheet" href="../css/styles_singup.css">
   
</head>

<body>

  <section class="hero">

    <video autoplay muted loop playsinline class="bg-video">

      <source src="../img/floresta..mp4" type="video/mp4">

    </video>

    <div class="overlay"></div>

    <header>
      <div class="logo" onclick="window.location.href='home.html'">
        JAVELF
      </div>

      <div class="profile">

        <img src="../img/user-64.png" alt="profile">

      </div>

    </header>

    <div class="container">

      <div class="card">

        <!-- LEFT -->

        <div class="left">

          <h2>Aproveite os benefícios de ser usuário</h2>

          <p>
            Ao se cadastrar você tem acesso a exclusividades do jogo
          </p>

          <img
            class="character"
            src="../img/NanamiCat1.png"
            alt="Personagem"
          >

        </div>

        <!-- RIGHT -->

        <div class="right">

          <h2>Cadastre-se</h2>

          <p>
            Preencha com suas informações para criar a conta.
          </p>

          <form action="/Backend/php/cadastro.php" method="post">

            <input type="text" name="Nome" placeholder="Nome">

            <input type="email" name="email" placeholder="E-mail">

            <input type="tel" name="Telefone" placeholder="Telefone">

            <input type="password" name="Senha" placeholder="Senha">

            <label class="checkbox">
              <input type="checkbox">
              Desejo receber notificações por e-mail
            </label>

            <label class="checkbox">
              <input type="checkbox">
              Desejo receber notificações por SMS
            </label>

            <button type="submit">
              Continuar
            </button>

          </form>

          <div class="login">
            Já tem uma conta?
            <a href="../html/loginUser.html">Faça o login</a>
          </div>

        </div>

      </div>

    </div>

  </section>

</body>
</html>
