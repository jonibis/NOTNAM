<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Support | JAVELF</title>

    <link rel="stylesheet" href="../css/support.css">

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

</head>

<body>

    <nav class="navbar">

        <div class="logo">

            JAVELF

        </div>

        <div class="menu">

            <a href="../html/história.html">HISTÓRIA</a>

            <a href="../html/forum.html">FORUM</a>

            <a href="../html/personagens.html">PERSONAGENS</a>

            <a href="../html/support.html">SUPPORT</a>

        </div>

        <div class="login-area">

            <a href="../html/signupUser.html" class="login-btn">

                LOGIN

            </a>

            <div class="user-avatar">

                <img src="../img/user-64.png">

            </div>

        </div>

    </nav>


    <section class="support">

        <h1>SUPORTE</h1>

        <p>

            Está com problemas no jogo?

            Nossa equipe responderá o mais rápido possível.

        </p>

        <form id="supportForm">

            <input type="text" name="nome" placeholder="Nome">

            <input type="email" name="email" placeholder="Email">

            <input type="text" name="assunto" placeholder="Assunto">

            <textarea name="mensagem" placeholder="Descreva seu problema"></textarea>

            <button type="submit" class="enviar">

                ENVIAR

            </button>

        </form>
        <p id="mensagemSucesso"></p>

    </section>

    <footer>

        <div>

            <h3>Discord</h3>

            <p>Entre na comunidade</p>

        </div>

        <div>

            <h3>FAQ</h3>

            <p>Perguntas frequentes</p>

        </div>

        <div>

            <h3>Email</h3>

            <p>support@javelf.com</p>

        </div>

        <div>

            <h3>Instagram</h3>

            <p>@javelfstudio</p>

        </div>

    </footer>

    <script src="../js/support.js"></script>
</body>

</html>
