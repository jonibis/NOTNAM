<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Not Name - A Jornada do Nome Perdido</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles2.css/styles2.css">
</head>

<body>

  <!-- HERO -->

  <section class="hero">

    <video autoplay muted loop playsinline class="bg-video">

      <source src="imagem/florestamisteriosa.mp4" type="video/mp4">

    </video>

    <div class="video-overlay"></div>

    <nav class="navbar">

      <div class="logo">
        JAVELF
      </div>

      <div class="menu">
        <a href="#">HISTÓRIA</a>
        <a href="#">FEEDBACK</a>
        <a href="#">PERSONAGENS</a>
        <a href="#">SUPPORT</a>
      </div>

      <div class="login-area">
        <a href="Frontend/html/signupUser.html" class="login-btn" >
          <button class="login-btn" id="loginButton">
            LOGIN
          </button>
        </a>

        <div class="user-avatar">
          <img src="imagem/conta-de-usuario (2).png" alt="Usuário">

        </div>

      </div>

    </nav>

    

    <div class="hero-content">

      <div class="hero-text">
        <h1>
          Not Name
        </h1>

        <p>
          A JORNADA DO NOME PERDIDO
        </p>
      </div>

      <a href="#" class="download-btn">
        Download
      </a>

    </div>

  </section>

  <!-- CARDS -->

  <section class="cards">

    <div class="card">
      <p>Descubra</p>
      <img src="imagem/sono.png" alt="">
    </div>

    <div class="card">
      <p>Aventure-se</p>
      <img src="imagem/castelo.png" alt="">
    </div>

    <div class="card">
      <p>Batalhe</p>
      <img src="imagem/batalha.png" alt="">
    </div>

  </section>

  <!-- CONTENT -->

  <section class="content">

    <div class="platforms">

      <div class="platform">
        <img src="imagem/playstation.png">
      </div>

      <div class="platform">
        <img src="imagem/xboxone.png">
      </div>

      <div class="platform">
        <img src="imagem/nintendo.png">
      </div>

    </div>

    <div class="big-image">

      <img src="imagem/jacare.png" class="slide active" alt="Jacare">
      <img src="imagem/fantasmas.png" class="slide" alt="Fantasmas">
      <img src="imagem/cabana.png" class="slide" alt="Cabana">
    </div>

  </section>

  <!-- FOOTER -->

  <footer>

    <div class="footer-column">
      <h3>Explore</h3>
      <p>Homepage</p>
      <p>The Game</p>
      <p>Characters</p>
    </div>

    <div class="footer-column">
      <h3>Support</h3>
      <p>Help</p>
      <p>Community</p>
      <p>FAQ</p>
    </div>

    <div class="footer-column">
      <h3>Explore</h3>
      <p>News</p>
      <p>Updates</p>
      <p>Discord</p>
    </div>

    <div class="footer-column">
      <h3>Explore</h3>
      <p>Instagram</p>
      <p>Twitter</p>
      <p>YouTube</p>
    </div>

  </footer>
  <script src="script.js/script.js"></script>
</body>

</html>
